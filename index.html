<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>
<div class="hearts"></div>

<div class="loader">
    <button id="startBtn">❤️ Start ❤️</button>
</div>

<div class="container">

    <audio id="music" loop>
        <source src="assets/music/song.mp3" type="audio/mpeg">
    </audio>

    <section class="hero">
        <h1>❤️ Our Love Story ❤️</h1>
        <p>Every moment with you is special.</p>
    </section>

    <section class="gallery">

        <img src="assets/images/1.jpg">
        <img src="assets/images/2.jpg">
        <img src="assets/images/3.jpg">
        <img src="assets/images/4.jpg">

    </section>

    <section class="message">

        <h2>💌 رسالة</h2>

        <p>
            اكتب هنا الكلام اللي انت عايزه يظهر.
        </p>

    </section>

    <section class="counter">

        <h2>Together Since ❤️</h2>

        <h1 id="days"></h1>

    </section>

</div>

<script src="script.js"></script>

</body>
</html>
